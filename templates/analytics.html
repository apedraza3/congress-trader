{% extends "base.html" %}
{% block content %}
<div class="page-header">
    <h1>Analytics</h1>
</div>

<div class="stats-strip">
    <div class="stat-box"><span class="stat-value" id="totalTrades">0</span><span class="stat-label">Total Trades</span></div>
    <div class="stat-box"><span class="stat-value" id="totalPnl">--</span><span class="stat-label">Total P&L</span></div>
    <div class="stat-box"><span class="stat-value" id="winRate">--</span><span class="stat-label">Win Rate</span></div>
    <div class="stat-box"><span class="stat-value" id="vsSP500">--</span><span class="stat-label">vs S&P 500</span></div>
</div>

<div class="grid-2">
    <div class="card">
        <div class="card-title">P&L Over Time</div>
        <div class="chart-container">
            <canvas id="pnlChart"></canvas>
        </div>
    </div>
    <div class="card">
        <div class="card-title">Trades by Sector</div>
        <div class="chart-container">
            <canvas id="sectorChart"></canvas>
        </div>
    </div>
</div>

<div class="card">
    <div class="card-title">Recent Closed Trades</div>
    <div id="recentClosed">
        <div class="loading">Loading...</div>
    </div>
</div>

<div class="grid-2">
    <div class="card">
        <div class="card-title">Top Winning Trades</div>
        <div id="topWins"><div class="loading">Loading...</div></div>
    </div>
    <div class="card">
        <div class="card-title">Worst Trades</div>
        <div id="topLosses"><div class="loading">Loading...</div></div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<script>
(function() {
    var pnlChart = null, sectorChart = null;

    function load() {
        apiFetch('/api/analytics').then(function(a) {
            document.getElementById('totalTrades').textContent = a.total_trades || 0;

            var pnl = a.total_pnl || 0;
            var pnlEl = document.getElementById('totalPnl');
            pnlEl.textContent = (pnl >= 0 ? '+' : '-') + '$' + Math.abs(pnl).toFixed(2);
            pnlEl.className = 'stat-value ' + (pnl >= 0 ? 'text-green' : 'text-red');

            document.getElementById('winRate').textContent = a.win_rate != null ? a.win_rate.toFixed(1) + '%' : '--';

            var vs = a.vs_sp500_pct;
            var vsEl = document.getElementById('vsSP500');
            if (vs != null) {
                vsEl.textContent = (vs >= 0 ? '+' : '') + vs.toFixed(2) + '%';
                vsEl.className = 'stat-value ' + (vs >= 0 ? 'text-green' : 'text-red');
            }

            renderPnlChart(a.pnl_series || []);
            renderSectorChart(a.sector_breakdown || {});
        });

        apiFetch('/api/trades?status=closed').then(function(trades) {
            trades.sort(function(a, b) { return (b.pnl || 0) - (a.pnl || 0); });
            renderTradeList('recentClosed', trades.slice(0, 10));
            renderTradeList('topWins', trades.filter(function(t) { return (t.pnl || 0) > 0; }).slice(0, 5));
            var losses = trades.filter(function(t) { return (t.pnl || 0) < 0; });
            losses.sort(function(a, b) { return (a.pnl || 0) - (b.pnl || 0); });
            renderTradeList('topLosses', losses.slice(0, 5));
        });
    }

    function renderTradeList(id, trades) {
        var el = document.getElementById(id);
        if (!trades.length) { el.innerHTML = '<div class="empty-state">No data</div>'; return; }

        var html = '<table class="data-table"><thead><tr><th>Ticker</th><th>Entry</th><th>Exit</th><th>P&L</th></tr></thead><tbody>';
        trades.forEach(function(t) {
            var pnl = t.pnl || 0;
            var cls = pnl >= 0 ? 'text-green' : 'text-red';
            html += '<tr><td><strong>' + esc(t.ticker) + '</strong></td>' +
                '<td>' + formatMoney(t.entry_price) + '</td>' +
                '<td>' + formatMoney(t.exit_price) + '</td>' +
                '<td class="' + cls + '">' + (pnl >= 0 ? '+' : '-') + '$' + Math.abs(pnl).toFixed(2) + '</td></tr>';
        });
        html += '</tbody></table>';
        el.innerHTML = html;
    }

    function renderPnlChart(series) {
        var ctx = document.getElementById('pnlChart').getContext('2d');
        if (pnlChart) pnlChart.destroy();

        pnlChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: series.map(function(s) { return s.date; }),
                datasets: [{
                    label: 'Cumulative P&L',
                    data: series.map(function(s) { return s.cumulative_pnl; }),
                    borderColor: '#6366f1',
                    backgroundColor: 'rgba(99,102,241,0.1)',
                    fill: true,
                    tension: 0.3
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    x: { grid: { color: '#2a2d3a' }, ticks: { color: '#71717a' } },
                    y: { grid: { color: '#2a2d3a' }, ticks: { color: '#71717a' } }
                }
            }
        });
    }

    function renderSectorChart(sectors) {
        var ctx = document.getElementById('sectorChart').getContext('2d');
        if (sectorChart) sectorChart.destroy();

        var labels = Object.keys(sectors);
        var values = Object.values(sectors);
        if (!labels.length) { labels = ['No data']; values = [1]; }

        var colors = ['#6366f1','#22c55e','#eab308','#ef4444','#06b6d4','#f97316','#8b5cf6','#ec4899'];

        sectorChart = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: labels,
                datasets: [{
                    data: values,
                    backgroundColor: colors.slice(0, labels.length)
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { position: 'right', labels: { color: '#e4e4e7', font: { size: 11 } } }
                }
            }
        });
    }

    load();
})();
</script>
{% endblock %}
